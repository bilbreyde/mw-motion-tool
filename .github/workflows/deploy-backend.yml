# Deploy Backend → Azure Functions
#
# REQUIRED SECRET: AZURE_CREDENTIALS
# Generate with:
#   az ad sp create-for-rbac \
#     --name "mw-motion-tool-deploy" \
#     --role contributor \
#     --scopes /subscriptions/7d70637f-bd34-4728-b41e-5a5c9f652d5d/resourceGroups/rg-mw-motion-tool \
#     --sdk-auth
# Paste the full JSON output as the AZURE_CREDENTIALS secret at:
#   https://github.com/bilbreyde/mw-motion-tool/settings/secrets/actions

name: Deploy Backend → Azure Functions

on:
  push:
    branches: [master]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

env:
  AZURE_FUNCTIONAPP_NAME: func-mw-motion-tool
  AZURE_RESOURCE_GROUP: rg-mw-motion-tool
  NODE_VERSION: '24'

jobs:
  build-and-deploy:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Build TypeScript
        working-directory: backend
        run: npm run build

      - name: Prune dev dependencies
        working-directory: backend
        run: npm prune --omit=dev

      - name: Zip backend contents
        shell: pwsh
        run: Compress-Archive -Path backend\* -DestinationPath backend.zip

      - name: Azure Login
        shell: pwsh
        env:
          AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}
        run: |
          $creds = $env:AZURE_CREDENTIALS | ConvertFrom-Json
          az login --service-principal `
            --username $creds.clientId `
            --password $creds.clientSecret `
            --tenant $creds.tenantId `
            --output none
          az account set --subscription $creds.subscriptionId --output none

      - name: Deploy to Azure Functions
        shell: pwsh
        run: |
          az functionapp deploy `
            --name ${{ env.AZURE_FUNCTIONAPP_NAME }} `
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} `
            --src-path backend.zip `
            --type zip
